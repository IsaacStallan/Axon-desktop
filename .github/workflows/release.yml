name: Build and Release Axon

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild 2>/dev/null || true

      - name: Create .env for build
        run: |
          printf 'ARETICA_ANTHROPIC_KEY=%s\n' '${{ secrets.ARETICA_ANTHROPIC_KEY }}' >> .env
          printf 'ARETICA_ELEVENLABS_KEY=%s\n' '${{ secrets.ARETICA_ELEVENLABS_KEY }}' >> .env
          printf 'ARETICA_ELEVENLABS_VOICE_ID=%s\n' '${{ secrets.ARETICA_ELEVENLABS_VOICE_ID }}' >> .env
          printf 'ARETICA_SUPABASE_URL=%s\n' '${{ secrets.ARETICA_SUPABASE_URL }}' >> .env
          printf 'ARETICA_SUPABASE_ANON_KEY=%s\n' '${{ secrets.ARETICA_SUPABASE_ANON_KEY }}' >> .env
          printf 'NODE_ENV=production\n' >> .env

      - name: Verify .env
        run: |
          grep -c "ARETICA_ANTHROPIC_KEY" .env && echo "ANTHROPIC key present" || echo "ANTHROPIC key MISSING"
          grep -c "ARETICA_SUPABASE_URL" .env && echo "SUPABASE_URL present" || echo "SUPABASE_URL MISSING"

      - name: Inject build constants
        env:
          ARETICA_ANTHROPIC_KEY: ${{ secrets.ARETICA_ANTHROPIC_KEY }}
          ARETICA_ELEVENLABS_KEY: ${{ secrets.ARETICA_ELEVENLABS_KEY }}
          ARETICA_ELEVENLABS_VOICE_ID: ${{ secrets.ARETICA_ELEVENLABS_VOICE_ID }}
          ARETICA_SUPABASE_URL: ${{ secrets.ARETICA_SUPABASE_URL }}
          ARETICA_SUPABASE_ANON_KEY: ${{ secrets.ARETICA_SUPABASE_ANON_KEY }}
          ARETICA_OPENAI_KEY: ${{ secrets.ARETICA_OPENAI_KEY }}
        run: |
          node scripts/inject-env.js
          echo "Keys written to buildConstants.ts:"
          grep -v "AUTO-GENERATED\|Generated\|export\|{" src/buildConstants.ts | grep -v "^}" | grep -v "^$"

      - name: Build and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish -- --arch=universal

      - name: Generate latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DMG_FILE="Axon.dmg"
          ZIP_FILE="Axon-darwin-universal-${VERSION}.zip"

          # Get file sizes
          DMG_SIZE=$(stat -f%z "out/make/${DMG_FILE}" 2>/dev/null || stat -c%s "out/make/${DMG_FILE}" 2>/dev/null || echo "0")
          ZIP_SIZE=$(stat -f%z "out/make/zip/darwin/universal/${ZIP_FILE}" 2>/dev/null || find out/make -name "*.zip" -exec stat -f%z {} \; 2>/dev/null | head -1 || echo "0")

          # Get SHA512 of zip
          ZIP_PATH=$(find out/make -name "*.zip" | head -1)
          SHA512=$(shasum -a 512 "${ZIP_PATH}" | awk '{print $1}' | xxd -r -p | base64)

          # Generate latest-mac.yml
          cat > latest-mac.yml << EOF
          version: ${VERSION}
          files:
            - url: ${ZIP_FILE}
              sha512: ${SHA512}
              size: ${ZIP_SIZE}
          path: ${ZIP_FILE}
          sha512: ${SHA512}
          releaseDate: '$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'
          EOF

          echo "Generated latest-mac.yml:"
          cat latest-mac.yml

          # Upload to GitHub release
          gh release upload "v${VERSION}" latest-mac.yml --clobber

      - name: Also upload latest-mac.yml as top-level asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" latest-mac.yml --clobber || true
