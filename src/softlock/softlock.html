<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; connect-src ws://localhost:* http://localhost:*" />
  <title>Axon — Lock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cyan: #00D4FF;
      --bg:   #050810;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'SF Pro Text', -apple-system, system-ui, sans-serif;
      color: #aabbcc;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* scanline */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,212,255,0.010) 3px, rgba(0,212,255,0.010) 4px
      );
      pointer-events: none; z-index: 999;
    }

    canvas#wave {
      display: block;
      width: 260px; height: 260px;
      margin-bottom: 36px;
    }

    #reason {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 52px;
      font-weight: normal;
      color: var(--cyan);
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 14px;
    }

    #sub {
      font-size: 13px;
      color: #556677;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 48px;
    }

    #countdown {
      font-size: 12px;
      color: #445566;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    #btn-going {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-size: 13px;
      letter-spacing: 3px;
      padding: 13px 40px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      margin-bottom: 24px;
    }
    #btn-going:hover { background: var(--cyan); color: #000; }
    #btn-going:disabled { opacity: 0.4; cursor: default; background: transparent; }

    #btn-override {
      font-size: 10px;
      color: #334455;
      letter-spacing: 1px;
      text-decoration: none;
      transition: color 0.2s;
    }
    #btn-override:hover { color: #556677; }

    #override-msg {
      display: none;
      font-size: 11px;
      color: #445566;
      letter-spacing: 1.5px;
    }
  </style>
</head>
<body>
  <canvas id="wave" width="260" height="260"></canvas>
  <div id="reason">LOCK</div>
  <div id="sub">You committed to this.</div>
  <div id="countdown">Loading...</div>
  <button id="btn-going">I'm going</button>
  <a href="#" id="btn-override">I need to keep working</a>
  <div id="override-msg"></div>
</body>
</html>
