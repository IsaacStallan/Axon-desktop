<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; connect-src ws://localhost:* http://localhost:*" />
  <title>Axon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:    #00D4FF;
      --border:  #004455;
      --bg:      #000000;
      --text:    #CCCCCC;
      --text-hi: #FFFFFF;
      --dim:     #444444;
    }

    html, body {
      width: 420px;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: 'Courier New', 'Lucida Console', monospace;
      color: var(--text);
    }

    /* ── Main panel ──────────────────────────────────────────────────────────── */
    #panel {
      width: 420px;
      height: 680px;
      background: #000000;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Scanline overlay */
    #panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 212, 255, 0.012) 3px,
        rgba(0, 212, 255, 0.012) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
      gap: 8px;
    }

    #title {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 4px;
      color: var(--cyan);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #333333;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #status-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text);
      flex: 1;
      transition: color 0.3s;
    }

    #clock {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-hi);
      -webkit-app-region: no-drag;
    }

    #window-controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    #window-controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 22px;
      height: 22px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s;
    }

    #window-controls button:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* ── Waveform ─────────────────────────────────────────────────────────────── */
    #waveform-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 0 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    #waveform-canvas {
      display: block;
    }

    /* ── Axon status bar ─────────────────────────────────────────────────────── */
    #axon-status-bar {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 6px;
    }

    #axon-status-bar::before {
      content: '▸';
      font-size: 9px;
      color: var(--cyan);
      opacity: 0.7;
      flex-shrink: 0;
    }

    #axon-activity {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--text);
      opacity: 0.75;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Stats row (focus / drift) ───────────────────────────────────────────── */
    #stats-row {
      display: flex;
      height: 44px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-block {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
    }

    .stat-block + .stat-block {
      border-left: 1px solid var(--border);
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text);
      opacity: 0.45;
    }

    .stat-value {
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 1px;
    }

    /* ── Open apps ───────────────────────────────────────────────────────────── */
    #open-apps-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: 6px;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text);
      opacity: 0.45;
      padding: 6px 12px 3px;
    }

    .apps-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
      padding: 2px 12px;
      min-height: 16px;
    }

    .app-chip {
      font-size: 9px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .app-chip.active {
      color: var(--cyan);
    }

    .app-chip.inactive {
      color: var(--dim);
    }

    /* ── Goals (formerly Priorities) ─────────────────────────────────────────── */
    #priorities-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .priority-item {
      display: flex;
      align-items: center;
      padding: 4px 12px;
      gap: 6px;
    }

    .priority-num {
      font-size: 9px;
      color: var(--cyan);
      opacity: 0.6;
      width: 16px;
      flex-shrink: 0;
    }

    .priority-text {
      font-size: 10px;
      color: var(--text-hi);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.3px;
    }

    .priority-bar-wrap {
      width: 48px;
      height: 4px;
      background: var(--border);
      flex-shrink: 0;
      border-radius: 2px;
      overflow: hidden;
    }

    .priority-bar-fill {
      height: 100%;
      background: var(--cyan);
      border-radius: 2px;
    }

    .priority-pct {
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 0.5px;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Agents ───────────────────────────────────────────────────────────────── */
    #agents-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 50px;
    }

    #agents-list {
      padding: 0 12px 6px;
    }

    .no-agents {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      padding: 3px 0;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 2px 0;
    }

    .agent-item.agent-running { color: var(--cyan); }
    .agent-item.agent-done    { color: #00FFAA; }
    .agent-item.agent-failed  { color: #FF4444; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .agent-spin {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    /* ── Commitments ──────────────────────────────────────────────────────────── */
    #commitments-section {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    #commitments-section::-webkit-scrollbar { width: 3px; }
    #commitments-section::-webkit-scrollbar-track { background: transparent; }
    #commitments-section::-webkit-scrollbar-thumb { background: var(--border); }

    .commitment-item {
      display: flex;
      align-items: flex-start;
      padding: 4px 12px;
      gap: 7px;
    }

    .commitment-arrow {
      color: var(--cyan);
      font-size: 10px;
      opacity: 0.6;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .commitment-text {
      font-size: 10px;
      color: var(--text);
      letter-spacing: 0.3px;
      line-height: 1.4;
    }

    /* ── Status dot state colours ─────────────────────────────────────────────── */
    body.listening  #status-dot { background: #00D4FF; }
    body.thinking   #status-dot { background: #FFFFFF; }
    body.speaking   #status-dot { background: #00FFAA; }
    body.idle       #status-dot { background: #333333; }
    body.urgent     #status-dot { background: #FF4444; }

    body.listening  #status-text { color: #00D4FF; }
    body.thinking   #status-text { color: #CCCCCC; }
    body.speaking   #status-text { color: #00FFAA; }

    /* ── Mini pill ────────────────────────────────────────────────────────────── */
    #mini-pill {
      position: fixed;
      inset: 0;
      width: 320px;
      height: 48px;
      background: #000000;
      border: 1px solid var(--border);
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      cursor: pointer;
      -webkit-app-region: drag;
      z-index: 200;
    }

    #mini-pill span.pill-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--cyan);
      -webkit-app-region: no-drag;
    }

    #mini-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333333;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #mini-waveform {
      display: block;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="idle">

  <!-- Mini pill (shown when collapsed) -->
  <div id="mini-pill" style="display:none">
    <canvas id="mini-waveform" width="40" height="40"></canvas>
    <span id="mini-status-dot"></span>
    <span class="pill-label">AXON</span>
  </div>

  <!-- Main panel -->
  <div id="panel">

    <!-- Header -->
    <div id="header">
      <span id="title">AXON</span>
      <span id="status-dot"></span>
      <span id="status-text">IDLE</span>
      <span id="clock">00:00</span>
      <div id="window-controls">
        <button id="minimise-btn" title="Minimise">—</button>
        <button id="close-btn" title="Collapse to pill">✕</button>
      </div>
    </div>

    <!-- Central waveform -->
    <div id="waveform-container">
      <canvas id="waveform-canvas" width="200" height="200"></canvas>
    </div>

    <!-- Axon status bar -->
    <div id="axon-status-bar">
      <span id="axon-activity">Monitoring your activity</span>
    </div>

    <!-- Focus / Drift stats -->
    <div id="stats-row">
      <div class="stat-block">
        <div class="stat-label">FOCUS</div>
        <div class="stat-value" id="focus-time">0m</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">DRIFT</div>
        <div class="stat-value" id="drift-time">0m</div>
      </div>
    </div>

    <!-- Open apps -->
    <div id="open-apps-section">
      <div class="section-label">OPEN APPS</div>
      <div class="apps-row" id="apps-active-row"></div>
      <div class="apps-row" id="apps-inactive-row"></div>
    </div>

    <!-- Goals -->
    <div id="priorities-section">
      <div class="section-label">GOALS</div>
      <div id="priorities-list"></div>
    </div>

    <!-- Agents -->
    <div id="agents-section">
      <div class="section-label">AGENTS</div>
      <div id="agents-list"><div class="no-agents">no agents active</div></div>
    </div>

    <!-- Commitments -->
    <div id="commitments-section">
      <div class="section-label">OPEN COMMITMENTS</div>
      <div id="commitments-list"></div>
    </div>

  </div>

</body>
</html>
