<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; connect-src ws://localhost:* http://localhost:*" />
  <title>Axon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:       #00D4FF;
      --border:     #004455;
      --bg:         #000000;
      --text:       #CCCCCC;
      --text-hi:    #FFFFFF;
    }

    html, body {
      width: 420px;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: 'Courier New', 'Lucida Console', monospace;
      color: var(--text);
    }

    /* ── Main panel ──────────────────────────────────────────────────────────── */
    #panel {
      width: 420px;
      height: 680px;
      background: #000000;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Scanline overlay */
    #panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 212, 255, 0.012) 3px,
        rgba(0, 212, 255, 0.012) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
      gap: 8px;
    }

    #title {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 4px;
      color: var(--cyan);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #333333;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #status-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text);
      flex: 1;
      transition: color 0.3s;
    }

    #clock {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-hi);
      -webkit-app-region: no-drag;
    }

    #window-controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    #window-controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 22px;
      height: 22px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s;
    }

    #window-controls button:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* ── Waveform ─────────────────────────────────────────────────────────────── */
    #waveform-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    #waveform-canvas {
      display: block;
    }

    /* ── Stats row ────────────────────────────────────────────────────────────── */
    #stats-row {
      display: flex;
      height: 78px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #today-stats {
      width: 110px;
      padding: 10px 12px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    #live-stats {
      flex: 1;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text);
      opacity: 0.55;
    }

    .stat-value {
      font-size: 14px;
      color: var(--cyan);
      letter-spacing: 1px;
    }

    #current-app {
      font-size: 11px;
      color: var(--text-hi);
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #productivity-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #productivity-fill {
      height: 100%;
      background: var(--cyan);
      width: 0%;
      transition: width 1s ease;
    }

    #session-time {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--text);
      opacity: 0.6;
    }

    /* ── Priorities ───────────────────────────────────────────────────────────── */
    #priorities-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Commitments ──────────────────────────────────────────────────────────── */
    #commitments-section {
      flex: 1;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
      min-height: 0;
    }

    #commitments-section::-webkit-scrollbar { width: 3px; }
    #commitments-section::-webkit-scrollbar-track { background: transparent; }
    #commitments-section::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Shared section styles ────────────────────────────────────────────────── */
    .section-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text);
      opacity: 0.45;
      padding: 8px 12px 4px;
    }

    .priority-item {
      display: flex;
      align-items: center;
      padding: 5px 12px;
      gap: 8px;
    }

    .priority-num {
      font-size: 9px;
      color: var(--cyan);
      opacity: 0.6;
      width: 18px;
      flex-shrink: 0;
    }

    .priority-text {
      font-size: 10px;
      color: var(--text-hi);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.5px;
    }

    .priority-bar-wrap {
      width: 58px;
      height: 3px;
      background: var(--border);
      flex-shrink: 0;
      border-radius: 1px;
      overflow: hidden;
    }

    .priority-bar-fill {
      height: 100%;
      background: var(--cyan);
      border-radius: 1px;
    }

    .commitment-item {
      display: flex;
      align-items: flex-start;
      padding: 5px 12px;
      gap: 7px;
    }

    .commitment-arrow {
      color: var(--cyan);
      font-size: 10px;
      opacity: 0.6;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .commitment-text {
      font-size: 10px;
      color: var(--text);
      letter-spacing: 0.3px;
      line-height: 1.4;
    }

    /* ── Status dot state colours ─────────────────────────────────────────────── */
    body.listening  #status-dot { background: #00D4FF; }
    body.thinking   #status-dot { background: #FFFFFF; }
    body.speaking   #status-dot { background: #00FFAA; }
    body.idle       #status-dot { background: #333333; }
    body.urgent     #status-dot { background: #FF4444; }

    body.listening  #status-text { color: #00D4FF; }
    body.thinking   #status-text { color: #CCCCCC; }
    body.speaking   #status-text { color: #00FFAA; }

    /* ── Mini pill ────────────────────────────────────────────────────────────── */
    #mini-pill {
      position: fixed;
      inset: 0;
      width: 320px;
      height: 48px;
      background: #000000;
      border: 1px solid var(--border);
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      cursor: pointer;
      -webkit-app-region: drag;
      z-index: 200;
    }

    #mini-pill span.pill-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--cyan);
      -webkit-app-region: no-drag;
    }

    #mini-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333333;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #mini-waveform {
      display: block;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="idle">

  <!-- Mini pill (shown when collapsed) -->
  <div id="mini-pill" style="display:none">
    <canvas id="mini-waveform" width="40" height="40"></canvas>
    <span id="mini-status-dot"></span>
    <span class="pill-label">AXON</span>
  </div>

  <!-- Main panel -->
  <div id="panel">

    <!-- Header -->
    <div id="header">
      <span id="title">AXON</span>
      <span id="status-dot"></span>
      <span id="status-text">IDLE</span>
      <span id="clock">00:00</span>
      <div id="window-controls">
        <button id="minimise-btn" title="Minimise">—</button>
        <button id="close-btn" title="Collapse to pill">✕</button>
      </div>
    </div>

    <!-- Central waveform -->
    <div id="waveform-container">
      <canvas id="waveform-canvas" width="200" height="200"></canvas>
    </div>

    <!-- Stats row -->
    <div id="stats-row">
      <div id="today-stats">
        <div class="stat-label">FOCUS</div>
        <div class="stat-value" id="focus-time">0m</div>
        <div class="stat-label">DRIFT</div>
        <div class="stat-value" id="drift-time">0m</div>
      </div>
      <div id="live-stats">
        <div id="current-app">—</div>
        <div id="productivity-bar">
          <div id="productivity-fill"></div>
        </div>
        <div id="session-time">SESSION 0min</div>
      </div>
    </div>

    <!-- Priorities -->
    <div id="priorities-section">
      <div class="section-label">PRIORITIES</div>
      <div id="priorities-list"></div>
    </div>

    <!-- Commitments -->
    <div id="commitments-section">
      <div class="section-label">OPEN COMMITMENTS</div>
      <div id="commitments-list"></div>
    </div>

  </div>

</body>
</html>
